<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>코스피200 상대강도</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow"><span class="dot"></span>KOSPI 200 · 상대강도</div>
    <h1>코스피200 상대강도</h1>
    <div class="meta" id="meta">불러오는 중…</div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="controls" id="controls" hidden>
    <div class="seg" id="winSeg" role="tablist"><span class="glabel">기간</span></div>
    <div class="seg dir" id="dirSeg" role="tablist"><span class="glabel">방향</span></div>
    <div class="seg" id="tierSeg" role="tablist"><span class="glabel">거래대금</span></div>
  </div>

  <main>
    <div class="notice" id="notice" hidden></div>
    <div class="lead" id="lead" hidden></div>
    <div class="sortbar" id="sortEl"></div>
    <ul id="list"></ul>
  </main>

  <footer>
    <div class="leg">
      <span style="color:var(--up)">■ 상승/강세</span>
      <span style="color:var(--down)">■ 하락/약세</span>
      <span>🔥 자금 2배+</span>
      <span>★ 반복 등장</span>
      <span>🆕 신규 유입</span>
      <span>돌파 N일 = 창 안 임계↑ 일수</span>
    </div>
    RS(상대강도) = 종목 몸통 등락률 − 코스피200 지수 몸통 등락률. 강세=지수보다 강함, 약세=소외.
    거래대금 티어는 창 안에서 하루라도 임계를 넘긴 종목. 종목을 누르면 네이버 증권 차트로 이동.
    <br><br>본 정보는 투자 참고용이며 매매 권유가 아닙니다. 투자 판단과 책임은 본인에게 있습니다.
  </footer>
</div>
<script src="app.js"></script>
</body>
</html>
